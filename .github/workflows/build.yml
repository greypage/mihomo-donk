name: Compile Mihomo Core

on:
  push:
    branches:
      - Alpha
    paths-ignore:
      - "docs/**"
      - "README.md"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: '386',      output: '386',            upxflag: '--lzma --best' }
          - { goos: linux, goarch: amd64, goamd64: v1, output: amd64-compatible, upxflag: '--lzma --best' }
          - { goos: linux, goarch: amd64, goamd64: v3, output: amd64,            upxflag: '--lzma --best' }
          - { goos: linux, goarch: amd64, goamd64: v1, output: amd64-v1,         upxflag: '--lzma --best' }
          - { goos: linux, goarch: amd64, goamd64: v2, output: amd64-v2,         upxflag: '--lzma --best' }
          - { goos: linux, goarch: amd64, goamd64: v3, output: amd64-v3,         upxflag: '--lzma --best' }
          - { goos: linux, goarch: arm,   goarm: '5',  output: armv5,            upxflag: '--lzma --best' }
          - { goos: linux, goarch: arm,   goarm: '6',  output: armv6,            upxflag: '--lzma --best' }
          - { goos: linux, goarch: arm,   goarm: '7',  output: armv7,            upxflag: '--lzma --best' }
          - { goos: linux, goarch: arm64,              output: arm64,            upxflag: '--lzma --best' }
          - { goos: linux, goarch: mips,   gomips: softfloat, output: mips-softfloat,   upxflag: '--lzma --best' }
          - { goos: linux, goarch: mips,   gomips: hardfloat, output: mips-hardfloat,   upxflag: '--lzma --best' }
          - { goos: linux, goarch: mipsle, gomips: softfloat, output: mipsle-softfloat, upxflag: '--best' }
          - { goos: linux, goarch: mipsle, gomips: hardfloat, output: mipsle-hardfloat, upxflag: '--best' }
          - { goos: linux, goarch: mips64,             output: mips64,           upxflag: '--lzma --best' }
          - { goos: linux, goarch: mips64le,           output: mips64le,         upxflag: '--lzma --best' }
          - { goos: linux, goarch: riscv64,            output: riscv64,          upxflag: '--lzma --best' }
          - { goos: linux, goarch: s390x,              output: s390x,            upxflag: '--lzma --best' }
          - { goos: linux, goarch: loong64,            output: loong64-abi2,     upxflag: '--lzma --best' }
          - { goos: linux, goarch: loong64, abi: '1',  output: loong64-abi1,     upxflag: '--lzma --best' }
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup UPX
        run: |
          wget https://github.com/upx/upx/releases/download/v3.95/upx-3.95-amd64_linux.tar.xz
          tar xf upx-3.95-amd64_linux.tar.xz
          echo "upx=${{ github.workspace }}/upx-3.95-amd64_linux/upx" >> $GITHUB_ENV

      - name: Setup Go
        if: ${{ matrix.abi != '1' }}
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: false

      - name: Setup Go for loongarch abi1
        if: ${{ matrix.goarch == 'loong64' && matrix.abi == '1' }}
        run: |
          wget -q https://github.com/MetaCubeX/loongarch64-golang/releases/download/1.24.0/go1.24.0.linux-amd64-abi1.tar.gz
          sudo tar zxf go1.24.0.linux-amd64-abi1.tar.gz -C /usr/local
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Update CA
        run: |
          sudo apt-get update && sudo apt-get install ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt component/ca/ca-certificates.crt

      - name: Build Core
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOAMD64: ${{ matrix.goamd64 }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: 0
          GONOSUMCHECK: '*'
          GONOSUMDB: '*'
          GOFLAGS: -mod=mod
        run: |
          set -e
          VERSION="$(git rev-parse --short HEAD)"
          BUILDTIME="$(date -u)"
          LDFLAGS="-X 'github.com/metacubex/mihomo/constant.Version=${VERSION}' -X 'github.com/metacubex/mihomo/constant.BuildTime=${BUILDTIME}'"
          if [ -n "${{ secrets.DNS_AUTH_SECRET }}" ] && [ -n "${{ secrets.DNS_AUTH_DOMAINS }}" ]; then
            LDFLAGS="$LDFLAGS -X 'main.dnsAuthSecret=${{ secrets.DNS_AUTH_SECRET }}' -X 'main.dnsAuthDomains=${{ secrets.DNS_AUTH_DOMAINS }}'"
          fi
          LDFLAGS="$LDFLAGS -w -s -buildid="
          mkdir -p ./bin
          go build -v -tags with_gvisor -trimpath \
            -ldflags "$LDFLAGS" \
            -o ./bin/clash
          chmod +x ./bin/clash
          ${upx} ${{ matrix.upxflag }} ./bin/clash || true
          mkdir -p build_output
          tar -zcvf build_output/clash-linux-${{ matrix.output }}.tar.gz -C ./bin clash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.output }}
          path: build_output/clash-linux-${{ matrix.output }}.tar.gz

  Upload-Release:
    permissions: write-all
    needs: [Build]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd bin/
          find . -type f | sort | xargs sha256sum > checksums.txt
          cat checksums.txt

      - name: Delete old release assets
        uses: 8Mi-Tech/delete-release-assets-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: Prerelease-Alpha
          deleteOnlyFromDrafts: false

      - name: Update release tag
        uses: richardsimko/update-tag@v1
        with:
          tag_name: Prerelease-Alpha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Prerelease-Alpha
          files: bin/*
          prerelease: true
          generate_release_notes: true
          body: |
            Mihomo core build from Alpha branch.
            构建时间: ${{ github.event.head_commit.timestamp }}


